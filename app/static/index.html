<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EDA Generate Demo</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">EDA Generate Demo</p>
        <h1>输入提示词，返回一张原理图图片</h1>
        <p class="subtitle">
          当前是演示模式。前端输入会提交到后端，后端暂时固定使用一份结构化字典进行绘图并返回图片。
        </p>
      </section>

      <section class="panel">
        <form id="generate-form" class="prompt-form">
          <label class="label" for="prompt">提示词</label>
          <textarea
            id="prompt"
            name="prompt"
            rows="5"
            placeholder="例如：设计一个完成 RC 低通滤波功能的 EDA 原理图。"
          ></textarea>
          <div class="actions">
            <button type="submit" id="submit-btn">发送</button>
            <span id="status-text" class="status"></span>
          </div>
        </form>
      </section>

      <section class="panel result-panel">
        <div class="result-meta">
          <p class="label">返回结果</p>
          <p id="result-message" class="result-message">等待生成。</p>
        </div>
        <div class="image-shell">
          <img id="result-image" alt="原理图生成结果" hidden />
        </div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
  </html>
